<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="nGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6dffe0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e90ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0047ab;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Modern N Logo -->
  <g fill="url(#nGradient)">
    <!-- Left vertical bar -->
    <rect x="30" y="30" width="25" height="140" rx="8"/>
    <!-- Diagonal connection -->
    <polygon points="55,30 145,170 170,170 80,30"/>
    <!-- Right vertical bar -->
    <rect x="145" y="30" width="25" height="140" rx="8"/>
  </g>
</svg>